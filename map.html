<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#030712"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GeoShare Map"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>GeoShare — Live Map</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <link rel="icon" href="icon.svg"/>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
/* ═══════════════════════ RESET & ROOT ═══════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030712;
  --panel:rgba(3,7,18,.94);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.11);
  --green:#22d98a;
  --blue:#38bdf8;
  --orange:#fb923c;
  --red:#f43f5e;
  --text:#f1f5f9;
  --sub:#94a3b8;
  --sub2:#475569;
  --fh:'Space Grotesk',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --topH:54px;
  --botH:112px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fh);-webkit-font-smoothing:antialiased}

/* ═══════════════════════ TOPBAR ═══════════════════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:calc(var(--topH) + var(--safe-top));
  padding-top:var(--safe-top);
  background:var(--panel);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:14px;padding-right:14px;
}
.tb-logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:.92rem;letter-spacing:-.02em}
.tb-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);box-shadow:0 0 8px var(--green);
  transition:all .3s;
}
.tb-dot.live{animation:livePulse 1.6s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green)}50%{opacity:.3;box-shadow:none}}

.live-badge{
  display:flex;align-items:center;gap:6px;
  font-size:.62rem;font-weight:700;letter-spacing:.1em;
  color:var(--green);background:rgba(34,217,138,.08);
  border:1px solid rgba(34,217,138,.2);
  padding:3px 10px;border-radius:20px;
  opacity:0;transition:opacity .5s;
}
.live-badge.on{opacity:1}
.lb-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:livePulse 1.3s ease-in-out infinite}

.tb-right{display:flex;align-items:center;gap:7px}
.ic-btn{
  width:36px;height:36px;border-radius:9px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--sub);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.ic-btn:hover{background:rgba(255,255,255,.08);color:var(--text);border-color:var(--border2)}
.ic-btn:active{background:rgba(255,255,255,.12);transform:scale(.94)}

/* ═══════════════════════ MAP ═══════════════════════ */
#map{
  position:fixed;
  top:calc(var(--topH) + var(--safe-top));
  left:0;right:0;
  bottom:calc(var(--botH) + var(--safe-bot));
  z-index:1;background:var(--bg);
}

/* Leaflet control overrides */
.leaflet-control-zoom{
  border:1px solid var(--border)!important;
  border-radius:10px!important;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.4)!important;
}
.leaflet-control-zoom a{
  background:var(--panel)!important;color:var(--sub)!important;
  border-color:var(--border)!important;
  transition:all .15s!important;
  font-size:16px!important;
  width:32px!important;height:32px!important;
  line-height:32px!important;
}
.leaflet-control-zoom a:hover{background:rgba(255,255,255,.08)!important;color:var(--text)!important}
.leaflet-control-attribution{display:none!important}
.leaflet-bar a{display:flex!important;align-items:center!important;justify-content:center!important}

/* Custom popup */
.leaflet-popup-content-wrapper{
  background:rgba(3,7,18,.97)!important;
  border:1px solid rgba(34,217,138,.2)!important;
  border-radius:14px!important;
  box-shadow:0 20px 48px rgba(0,0,0,.6),0 0 0 1px rgba(34,217,138,.05)!important;
  backdrop-filter:blur(20px)!important;
  padding:0!important;
}
.leaflet-popup-content{margin:0!important;padding:16px 18px!important}
.leaflet-popup-tip-container{display:none!important}
.leaflet-popup-close-button{
  color:rgba(148,163,184,.6)!important;
  font-size:18px!important;top:8px!important;right:10px!important;
}
.leaflet-popup-close-button:hover{color:var(--text)!important}

/* My marker */
.my-pin-wrap{display:flex;align-items:center;justify-content:center;position:relative}
.my-pin-outer{
  width:22px;height:22px;border-radius:50%;
  background:rgba(34,217,138,.15);
  border:2px solid rgba(34,217,138,.4);
  display:flex;align-items:center;justify-content:center;
  animation:outerPulse 2s ease-in-out infinite;
}
@keyframes outerPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,217,138,.3)}50%{box-shadow:0 0 0 8px rgba(34,217,138,0)}}
.my-pin-inner{
  width:10px;height:10px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 2px var(--bg),0 0 10px rgba(34,217,138,.8);
  animation:pinIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pinIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* Accuracy circle */
.leaflet-interactive{cursor:default!important}

/* ═══════════════════════ BOTTOM PANEL ═══════════════════════ */
.botpanel{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--botH) + var(--safe-bot));
  padding-bottom:var(--safe-bot);
  background:var(--panel);
  border-top:1px solid var(--border);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  z-index:1000;
  display:flex;flex-direction:column;justify-content:center;
  padding-left:16px;padding-right:16px;gap:8px;
}
.bp-top{display:flex;align-items:center;justify-content:space-between}
.bp-title{font-size:.62rem;font-weight:700;letter-spacing:.1em;color:var(--sub2);text-transform:uppercase}
.bp-acc{
  font-family:var(--fm);font-size:.7rem;font-weight:600;
  padding:2px 10px;border-radius:20px;
  background:rgba(34,217,138,.08);border:1px solid rgba(34,217,138,.18);
  color:var(--green);transition:all .3s;
}
.bp-acc.coarse{background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.2);color:var(--orange)}
.bp-acc.bad{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.2);color:var(--red)}
.bp-coords{display:flex;align-items:center;gap:0}
.bpc{flex:1;display:flex;flex-direction:column;gap:2px}
.bpc-lbl{font-size:.6rem;color:var(--sub2);text-transform:uppercase;letter-spacing:.07em}
.bpc-val{font-family:var(--fm);font-size:1rem;font-weight:600;letter-spacing:-.02em;transition:color .3s}
.bpc-val.live{color:var(--green)}
.bp-div{width:1px;height:34px;background:var(--border);margin:0 14px}
.bp-time{font-size:.68rem;color:var(--sub2);display:flex;align-items:center;gap:6px}
.src-tag{
  font-size:.62rem;font-weight:600;letter-spacing:.04em;
  padding:2px 8px;border-radius:6px;
  background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.15);color:var(--blue);
  transition:all .3s;
}
.src-tag.gps{background:rgba(34,217,138,.07);border-color:rgba(34,217,138,.15);color:var(--green)}

/* ═══════════════════════ TOAST ═══════════════════════ */
.toast{
  position:fixed;
  bottom:calc(var(--botH) + var(--safe-bot) + 12px);
  left:50%;transform:translateX(-50%) translateY(8px);
  z-index:2000;
  background:rgba(6,14,31,.97);
  border:1px solid var(--border2);
  color:var(--text);font-size:.8rem;font-family:var(--fh);
  padding:9px 18px;border-radius:10px;
  backdrop-filter:blur(16px);
  opacity:0;transition:opacity .25s,transform .25s;
  white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════════════ POPUP INNER ═══════════════════════ */
.popup-inner{font-family:var(--fh);font-size:12.5px;color:var(--text);line-height:1.7;min-width:185px}
.popup-inner .pt{font-family:var(--fh);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:8px;display:block}
.popup-inner .pr{display:flex;justify-content:space-between;gap:16px;margin-bottom:2px}
.popup-inner .pk{color:var(--sub);font-size:.75rem}
.popup-inner .pv{font-family:var(--fm);font-size:.75rem;font-weight:600}
.popup-inner .pm{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.popup-inner .pm a{
  display:flex;align-items:center;gap:6px;
  color:var(--blue);font-size:.75rem;font-weight:600;
  text-decoration:none;
  padding:6px 10px;border-radius:7px;
  background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.15);
  justify-content:center;transition:all .15s;
}
.popup-inner .pm a:hover{background:rgba(56,189,248,.14)}

/* ═══════════════════════ NO-LOCATION OVERLAY ═══════════════════════ */
.no-loc{
  position:fixed;inset:0;z-index:3000;
  background:rgba(3,7,18,.88);backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.no-loc.gone{display:none}
.nlc{
  width:100%;max-width:380px;
  background:rgba(6,14,31,.98);
  border:1px solid var(--border2);border-radius:20px;
  padding:36px 28px 28px;
  display:flex;flex-direction:column;align-items:center;gap:13px;text-align:center;
  box-shadow:0 40px 80px rgba(0,0,0,.55);
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.nlc-icon{
  width:60px;height:60px;border-radius:50%;
  background:rgba(34,217,138,.1);border:1.5px solid rgba(34,217,138,.25);
  display:flex;align-items:center;justify-content:center;color:var(--green);
}
.nlc h2{font-size:1.3rem;font-weight:700}
.nlc p{font-size:.84rem;color:var(--sub);line-height:1.65;max-width:280px}
.nlc-btn{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#22d98a,#16a862);
  color:#021a0e;font-family:var(--fh);font-weight:700;font-size:.85rem;
  padding:13px 24px;border-radius:12px;text-decoration:none;margin-top:4px;
  transition:transform .15s,box-shadow .2s;
  box-shadow:0 8px 22px rgba(34,217,138,.25);
}
.nlc-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(34,217,138,.4)}
.nlc-skip{
  background:none;border:none;color:var(--sub2);font-family:var(--fh);
  font-size:.76rem;cursor:pointer;text-decoration:underline;
  transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.nlc-skip:hover{color:var(--sub)}

/* ═══════════════════════ POLL INDICATOR ═══════════════════════ */
.poll-ring{
  width:8px;height:8px;border-radius:50%;
  border:1.5px solid var(--sub2);border-top-color:var(--green);
  animation:_spin .8s linear infinite;display:inline-block;flex-shrink:0;
}
@keyframes _spin{to{transform:rotate(360deg)}}

@media(max-width:420px){
  .bpc-val{font-size:.9rem}
  .botpanel{padding-left:12px;padding-right:12px}
}
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">
    <div class="tb-dot" id="tbDot"></div>
    GeoShare
    <div class="live-badge" id="liveBadge"><div class="lb-dot"></div>LIVE</div>
  </div>
  <div class="tb-right">
    <button class="ic-btn" id="btnCenter" title="Center on location">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9"/></svg>
    </button>
    <button class="ic-btn" id="btnShare" title="Share location">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    </button>
    <button class="ic-btn" id="btnLayers" title="Change map style">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
    </button>
    <a class="ic-btn" href="index.html" title="Permission settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </a>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- BOTTOM PANEL -->
<div class="botpanel">
  <div class="bp-top">
    <span class="bp-title">My Location</span>
    <span class="bp-acc" id="bpAcc">— accuracy</span>
  </div>
  <div class="bp-coords">
    <div class="bpc"><span class="bpc-lbl">Latitude</span><span class="bpc-val" id="bpLat">—</span></div>
    <div class="bp-div"></div>
    <div class="bpc"><span class="bpc-lbl">Longitude</span><span class="bpc-val" id="bpLng">—</span></div>
  </div>
  <div class="bp-time" id="bpTime">
    <span class="poll-ring" id="pollRing" style="display:none"></span>
    <span id="bpTimeText">Waiting for location…</span>
    <span class="src-tag" id="srcTag" style="display:none"></span>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NO LOCATION OVERLAY -->
<div class="no-loc" id="noLocOverlay">
  <div class="nlc">
    <div class="nlc-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
    <h2>No Location Yet</h2>
    <p>Open <strong>GeoShare</strong> on your phone or allow GPS on this device to see your live position.</p>
    <a href="index.html" class="nlc-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Allow Location
    </a>
    <button class="nlc-skip" onclick="dismissOverlay()">I'll use the phone app instead →</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  GeoShare — VIEW ONLY (Sheet → Map)
// ═══════════════════════════════════════════════════════════════

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzXDUvblpb-D7lBlOa4Q786RRGi_tIwf7PtELYxwZkbCWMkI0yO7HYIVZ2FB55QOWWx/exec';
const POLL_MS = 10000;

// ── DOM ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const tbDot = $('tbDot');
const liveBadge = $('liveBadge');
const bpAcc = $('bpAcc');
const bpLat = $('bpLat');
const bpLng = $('bpLng');
const bpTimeText = $('bpTimeText');
const pollRing = $('pollRing');
const srcTag = $('srcTag');
const toast = $('toast');
const overlay = $('noLocOverlay');

// Hide overlay permanently
overlay.style.display = "none";

// ── MAP ──────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:true,attributionControl:false,preferCanvas:true});
let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20}).addTo(map);
map.setView([22.3039,70.8022],13);
L.control.scale({imperial:false,position:'bottomright'}).addTo(map);

// ── MARKER ───────────────────────────────────────────────────
const markerIcon = L.divIcon({
  className:'my-pin-wrap',
  html:'<div class="my-pin-outer"><div class="my-pin-inner"></div></div>',
  iconSize:[22,22],iconAnchor:[11,11]
});

let pin=null, accCircle=null, firstFly=true, hasPin=false, currentPos=null;

// ═════════ INIT ═════════
window.addEventListener('DOMContentLoaded',()=>{
  startSheetPoll();
});

// ═════════ SHEET POLLING ONLY ═════════
function startSheetPoll(){
  doPoll();
  setInterval(doPoll, POLL_MS);
}

async function doPoll(){
  pollRing.style.display='inline-block';

  try{
    const r = await fetch(SCRIPT_URL+'?action=latest&_='+Date.now(),{cache:'no-store'});
    const d = await r.json();
    pollRing.style.display='none';

    if(!d.found){
      if(!hasPin) bpTimeText.textContent='No data available';
      return;
    }

    const lat=parseFloat(d.latitude);
    const lng=parseFloat(d.longitude);
    const acc=parseFloat(d.accuracy)||20;
    const ts=new Date(d.timestamp);

    const age=Math.round((Date.now()-ts.getTime())/1000);

    placePin(lat,lng,acc);

    const ageStr = age<60 ? age+'s ago' : Math.round(age/60)+'m ago';
    bpTimeText.textContent = 'Updated '+ageStr;

    srcTag.textContent='📱 Live Device';
    srcTag.style.display='inline-flex';

  }catch(e){
    pollRing.style.display='none';
    if(!hasPin) bpTimeText.textContent='⚠️ Connection error';
  }
}

// ═════════ PLACE PIN ═════════
function placePin(lat,lng,acc){
  hasPin=true;
  currentPos={lat,lng,acc};
  const ll=[lat,lng];

  if(firstFly){
    firstFly=false;
    map.flyTo(ll,17,{duration:1.5});
  }

  if(!pin){
    pin=L.marker(ll,{icon:markerIcon}).addTo(map);
  } else pin.setLatLng(ll);

  const mapsUrl=`https://maps.google.com/?q=${lat},${lng}`;

  pin.bindPopup(`
    <div class="popup-inner">
      <span class="pt">📍 Live Location</span>
      <div class="pr"><span class="pk">Latitude</span><span class="pv">${lat.toFixed(7)}</span></div>
      <div class="pr"><span class="pk">Longitude</span><span class="pv">${lng.toFixed(7)}</span></div>
      <div class="pr"><span class="pk">Accuracy</span><span class="pv">±${Math.round(acc)} m</span></div>
      <div class="pm"><a href="${mapsUrl}" target="_blank">Open in Google Maps</a></div>
    </div>
  `);

  if(!accCircle){
    accCircle=L.circle(ll,{radius:acc,color:'#22d98a',fillOpacity:.07}).addTo(map);
  } else accCircle.setLatLng(ll).setRadius(acc);

  bpLat.textContent=lat.toFixed(6);
  bpLng.textContent=lng.toFixed(6);
  bpAcc.textContent='±'+Math.round(acc)+' m';

  tbDot.classList.add('live');
  liveBadge.classList.add('on');
}
</script>
</body>
</html>
